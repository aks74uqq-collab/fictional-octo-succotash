backend:
  name: github
  repo: aks74uqq-collab/fictional-octo-succotash
  branch: main
  # OAuth 代理地址：先部署 https://github.com/decaporg/oauth-provider 到你的 Vercel
  # 部署完成后，将下面的 base_url 替换为你的 OAuth 代理地址
  base_url: https://decap-cms-oauth-rouge.vercel.app

locale: zh_Hans

site_url: http://wqj.it.com
display_url: http://wqj.it.com

logo_url: /favicon.ico

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

publish_mode: editorial_workflow

collections:

  - name: "posts"
    label: "博客文章"
    label_singular: "文章"

    folder: "posts"

    create: true
    delete: true

    slug: "{{year}}/{{slug}}"

    summary: "{{title}}"

    editor:
      preview: true

    fields:

      - label: "标题"
        name: "title"
        widget: "string"
        required: true

      - label: "发布日期"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        default: "{{now}}"

      - label: "分类"
        name: "categories"
        widget: "list"
        required: false
        default: []

      - label: "标签"
        name: "tags"
        widget: "list"
        required: false
        default: []

      - label: "文章摘要"
        name: "description"
        widget: "text"
        required: false

      - label: "封面图"
        name: "cover"
        widget: "image"
        required: false

      - label: "置顶文章"
        name: "top"
        widget: "boolean"
        default: false
        required: false

      - label: "正文"
        name: "body"
        widget: "markdown"

  - name: "pages"
    label: "独立页面"

    files:

      - label: "关于本站"
        name: "about"
        file: "pages/about.md"

        fields:

          - label: "标题"
            name: "title"
            widget: "string"

          - label: "正文"
            name: "body"
            widget: "markdown"
